<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter Tool</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>
    <div class="converter-card">
        <h2>Universal Unit Converter</h2>
        
        <form method="POST" id="converterForm">
            <div class="input-group">
                <label for="category">Select Category:</label>
                <select name="category" id="category" onchange="updateUnits()">
                    {% for cat in categories.keys() %}
                        <option value="{{ cat }}" {% if cat == selected_category %}selected{% endif %}>{{ cat.title() }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="input-group">
                <label for="value">Value:</label>
                <input type="number" step="any" name="value" id="value" value="{{ val }}" required placeholder="Enter number...">
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label for="from_unit">From:</label>
                    <select name="from_unit" id="from_unit"></select>
                </div>
                <div class="input-group">
                    <label for="to_unit">To:</label>
                    <select name="to_unit" id="to_unit"></select>
                </div>
            </div>

            <button type="submit">Convert</button>
        </form>

        {% if result %}
            <div class="result-box">
                <strong>Result:</strong>
                <p>{{ result }}</p>
            </div>
        {% endif %}
    </div>

    <script>
        // Dictionary passed from Python mapping category -> unit options
        const unitData = {{ categories | tojson }};
        const oldFrom = "{{ from_unit }}";
        const oldTo = "{{ to_unit }}";

        function updateUnits() {
            const category = document.getElementById("category").value;
            const fromSelect = document.getElementById("from_unit");
            const toSelect = document.getElementById("to_unit");
            
            // Clear current options
            fromSelect.innerHTML = "";
            toSelect.innerHTML = "";

            // Populate options based on chosen category
            unitData[category].forEach(unit => {
                let opt1 = document.createElement("option");
                opt1.value = unit;
                opt1.textContent = unit;
                if(unit === oldFrom) opt1.selected = true;
                fromSelect.appendChild(opt1);

                let opt2 = document.createElement("option");
                opt2.value = unit;
                opt2.textContent = unit;
                if(unit === oldTo) opt2.selected = true;
                toSelect.appendChild(opt2);
            });
        }

        // Initialize lists on page load
        window.onload = updateUnits;
    </script>
</body>
</html>
